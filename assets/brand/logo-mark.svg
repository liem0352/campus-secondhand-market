<?xml version="1.0" encoding="UTF-8"?>
<!--
  校园易物 · 品牌徽标 mark-only（主色版本）
  - 用途：侧边栏、tab icon、深色背景上的品牌标识
  - 设计：圆角方块 + 双弧线交换循环（"易" 的图形化）
  - 配色：#FF7A45 主色 + 白色描边
  - 尺寸：viewBox 64x64，输出时可任意缩放
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="校园易物 logo">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A5C"/>
      <stop offset="100%" stop-color="#F25C2A"/>
    </linearGradient>
    <!-- 底部磨砂遮罩：顶部微透、底部更白，营造"玻璃底部蒙霜"质感 -->
    <linearGradient id="bottomMask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.34"/>
    </linearGradient>
  </defs>
  <!-- 圆角方形底板：主色渐变 -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#brandGradient)"/>
  <!-- 底部磨砂遮罩 -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bottomMask)"/>
  <!-- 交换循环：两段弧线 + 箭头（白色描边） -->
  <g fill="none" stroke="#FFFFFF" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 上半弧：左→右，顺时针 -->
    <path d="M 16 28 A 16 16 0 0 1 36 14"/>
    <polyline points="30,10 36,14 32,20"/>
    <!-- 下半弧：右→左，顺时针（视觉上形成完整循环） -->
    <path d="M 48 36 A 16 16 0 0 1 28 50"/>
    <polyline points="34,54 28,50 32,44"/>
  </g>
  <!-- 中心点缀：一个微小的圆点 -->
  <circle cx="32" cy="32" r="2.2" fill="#FFFFFF" fill-opacity="0.95"/>
</svg>
