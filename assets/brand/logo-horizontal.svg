<?xml version="1.0" encoding="UTF-8"?>
<!--
  校园易物 · 横向品牌组合（horizontal lockup）
  - 用途：侧边栏展开态、登录页、导航栏
  - 结构：mark + 2 字间距 + wordmark
  - 总宽高比约 3.6 : 1
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 64" width="232" height="64" role="img" aria-label="校园易物">
  <!-- mark -->
  <defs>
    <linearGradient id="brandGradient2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A5C"/>
      <stop offset="100%" stop-color="#F25C2A"/>
    </linearGradient>
    <!-- 底部磨砂遮罩 -->
    <linearGradient id="bottomMask2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.34"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#brandGradient2)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bottomMask2)"/>
  <g fill="none" stroke="#FFFFFF" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 16 28 A 16 16 0 0 1 36 14"/>
    <polyline points="30,10 36,14 32,20"/>
    <path d="M 48 36 A 16 16 0 0 1 28 50"/>
    <polyline points="34,54 28,50 32,44"/>
  </g>
  <circle cx="32" cy="32" r="2.2" fill="#FFFFFF" fill-opacity="0.95"/>

  <!-- wordmark -->
  <text x="80" y="42"
        font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Source Han Sans CN', sans-serif"
        font-size="24" font-weight="600" fill="#1F2937" letter-spacing="2">校园易物</text>
</svg>
