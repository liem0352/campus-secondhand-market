<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="100%" role="img" aria-labelledby="footTitle footDesc">
  <title id="footTitle">校园二手交易平台 - README 签名</title>
  <desc id="footDesc">README MADE WITH 签名,MIT License,作者 liem,4 实训整合。</desc>

  <!-- 画布背景 -->
  <rect x="0" y="0" width="1200" height="100" rx="20" fill="#0F1A14"/>

  <!-- 上分隔线 -->
  <line x1="48" y1="24" x2="1152" y2="24" stroke="#4A9B6E" stroke-width="1" opacity="0.25"/>

  <!-- 左侧:README MADE WITH -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="48" y="58" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2.2" fill="#6B7E72" font-weight="600">README MADE WITH</text>
    <text x="48" y="82" font-size="15" fill="#E8E4D9" font-weight="700">系统架构风视觉 · SVG 自包含</text>
  </g>

  <!-- 中间:作者与实训 -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="600" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2.2" fill="#6B7E72" font-weight="600">AUTHOR</text>
    <text x="600" y="82" text-anchor="middle" font-size="15" fill="#E8E4D9" font-weight="700">liem · 4 实训整合</text>
  </g>

  <!-- 右侧:License -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="1152" y="58" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" letter-spacing="2.2" fill="#E8B547" font-weight="600">LICENSE</text>
    <text x="1152" y="82" text-anchor="end" font-size="15" fill="#E8B547" font-weight="700">MIT</text>
