<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">校园二手交易平台 - 一后端三前端全栈架构</title>
  <desc id="heroDesc">Django + DRF 后端为中心,汇聚微信小程序买家端、Vue3 卖家工作台、Web 管理后台三前端,下方对接 MySQL 持久化。</desc>

  <!-- 画布背景:深森林黑绿 -->
  <rect x="0" y="0" width="1200" height="380" rx="20" fill="#0F1A14"/>

  <!-- 顶部细描边:松绿装饰线 -->
  <line x1="48" y1="48" x2="120" y2="48" stroke="#4A9B6E" stroke-width="2"/>

  <!-- 标题区:左对齐编辑型 -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="48" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2.2" fill="#4A9B6E" font-weight="600">C2C CAMPUS MARKETPLACE</text>
    <text x="48" y="148" font-size="46" fill="#E8E4D9" font-weight="700">校园二手交易平台</text>
    <text x="48" y="184" font-size="17" fill="#6B7E72">Django + DRF + Vue3 + 微信小程序,一后端三前端,4 次实训整合</text>
  </g>

  <!-- 架构拓扑图 group(下半区) -->
  <g transform="translate(48 220)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">

    <!-- 连线层 -->
    <g stroke="#4A9B6E" stroke-width="1" fill="none" opacity="0.7">
      <line x1="120" y1="22" x2="424" y2="48"/>
      <line x1="424" y1="22" x2="424" y2="48"/>
      <line x1="728" y1="22" x2="424" y2="48"/>
    </g>
    <!-- 后端 -> MySQL:琥珀,表示持久化链路 -->
    <line x1="524" y1="100" x2="524" y2="132" stroke="#E8B547" stroke-width="1" opacity="0.9"/>

    <!-- 买家端节点:左 -->
    <g>
      <rect x="40" y="0" width="160" height="44" rx="8" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <text x="120" y="20" text-anchor="middle" font-size="14" fill="#E8E4D9" font-weight="600">微信小程序</text>
      <text x="120" y="36" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72">买家 C 端</text>
    </g>

    <!-- 卖家端节点:中 -->
    <g>
      <rect x="344" y="0" width="160" height="44" rx="8" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <text x="424" y="20" text-anchor="middle" font-size="14" fill="#E8E4D9" font-weight="600">Vue3 + TS</text>
      <text x="424" y="36" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72">卖家工作台 :3000</text>
    </g>

    <!-- 管理端节点:右 -->
    <g>
      <rect x="648" y="0" width="160" height="44" rx="8" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <text x="728" y="20" text-anchor="middle" font-size="14" fill="#E8E4D9" font-weight="600">Web 管理后台</text>
      <text x="728" y="36" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72">平台运营</text>
    </g>

    <!-- 中心后端节点:松绿填充 -->
    <g>
      <rect x="344" y="48" width="160" height="52" rx="8" fill="#4A9B6E" stroke="#4A9B6E" stroke-width="1"/>
      <text x="424" y="74" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#FFFFFF" font-weight="700">Django + DRF</text>
      <text x="424" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#E8E4D9">backend :8000</text>
    </g>

    <!-- MySQL 节点:琥珀描边 -->
    <g>
      <rect x="344" y="132" width="160" height="32" rx="8" fill="none" stroke="#E8B547" stroke-width="1"/>
      <text x="424" y="153" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#E8B547" font-weight="600">MySQL · 持久化</text>
    </g>

    <!-- 右侧技术栈列 -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#6B7E72" font-size="11">
      <text x="880" y="20">RESTful API</text>
      <text x="880" y="40">JWT 鉴权</text>
      <text x="880" y="60">migrations 演进</text>
      <text x="880" y="80">services / AI</text>
      <text x="880" y="100">finance_legacy [已下线]</text>
    </g>
  </g>

  <!-- 底部署名 -->
  <text x="1152" y="360" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72" text-rendering="geometricPrecision">作者 liem · 4 实训整合 · MIT</text>

</svg>
