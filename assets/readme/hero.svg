<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">校园二手交易平台 — 一后端三前端全栈架构</title>
  <desc id="heroDesc">Django + DRF 后端为中心,汇聚微信小程序买家端、Vue3 卖家工作台、Web 管理后台三前端,下方对接 MySQL 持久化。</desc>

  <!-- 画布背景:深森林黑绿 -->
  <rect x="0" y="0" width="1200" height="380" rx="26" fill="#0F1A14"/>

  <!-- 顶部标题区(居中) -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="600" y="54" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="2.4" fill="#4A9B6E" font-weight="600">FULL-STACK · C2C MARKETPLACE</text>
    <text x="600" y="104" text-anchor="middle" font-size="44" fill="#E8E4D9" font-weight="700">校园二手交易平台</text>
    <text x="600" y="138" text-anchor="middle" font-size="18" fill="#6B7E72">Django + DRF + Vue3 + 微信小程序 · 一后端三前端</text>
  </g>

  <!-- 架构拓扑图 group -->
  <g transform="translate(56 155)" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">

    <!-- 连线层(先画线,后画节点,避免线压节点) -->
    <g stroke="#4A9B6E" stroke-width="1" fill="none" opacity="0.85">
      <!-- 买家端 -> 后端 -->
      <line x1="240" y1="28" x2="424" y2="62"/>
      <!-- 卖家端 -> 后端 -->
      <line x1="848" y1="28" x2="624" y2="62"/>
      <!-- 管理端 -> 后端 -->
      <line x1="524" y1="155" x2="524" y2="100"/>
      <!-- 后端 -> MySQL(琥珀,表示持久化链路) -->
      <line x1="624" y1="85" x2="728" y2="132" stroke="#E8B547" opacity="0.9"/>
    </g>

    <!-- 买家端节点:左上 -->
    <g>
      <rect x="60" y="0" width="180" height="55" rx="10" fill="#E8E4D9" stroke="#4A9B6E" stroke-width="1"/>
      <text x="150" y="25" text-anchor="middle" font-size="14" fill="#0F1A14" font-weight="600">微信小程序</text>
      <text x="150" y="44" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72">买家 C 端</text>
    </g>

    <!-- 卖家端节点:右上 -->
    <g>
      <rect x="848" y="0" width="180" height="55" rx="10" fill="#E8E4D9" stroke="#4A9B6E" stroke-width="1"/>
      <text x="938" y="25" text-anchor="middle" font-size="14" fill="#0F1A14" font-weight="600">Vue3 + TS</text>
      <text x="938" y="44" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72">卖家工作台 :3000</text>
    </g>

    <!-- 中心后端节点:校园松绿填充 -->
    <g>
      <rect x="424" y="30" width="200" height="70" rx="10" fill="#4A9B6E" stroke="#4A9B6E" stroke-width="1"/>
      <text x="524" y="60" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#FFFFFF" font-weight="700">Django + DRF</text>
      <text x="524" y="84" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#E8E4D9">backend :8000</text>
    </g>

    <!-- MySQL 节点:琥珀描边,后端右下方 -->
    <g>
      <rect x="728" y="115" width="200" height="35" rx="10" fill="none" stroke="#E8B547" stroke-width="1"/>
      <text x="828" y="138" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#E8B547" font-weight="600">MySQL · 持久化</text>
    </g>

    <!-- 管理端节点:下方中间(构成倒三角形) -->
    <g>
      <rect x="434" y="155" width="180" height="55" rx="10" fill="#E8E4D9" stroke="#4A9B6E" stroke-width="1"/>
      <text x="524" y="180" text-anchor="middle" font-size="14" fill="#0F1A14" font-weight="600">Web 管理后台</text>
      <text x="524" y="199" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6B7E72">平台运营</text>
    </g>

  </g>

  <!-- 底部署名 -->
  <text x="600" y="370" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6B7E72" text-rendering="geometricPrecision">作者 liem · 4 实训整合 · MIT</text>

</svg>
