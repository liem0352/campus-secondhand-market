<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" role="img" aria-labelledby="modTitle modDesc">
  <title id="modTitle">校园二手交易平台 - 7 大业务域卡片墙</title>
  <desc id="modDesc">用户、商品、订单、私聊、评价、信用分、AI 七大业务域卡片,展示各自核心能力与前端入口。</desc>

  <!-- 画布背景 -->
  <rect x="0" y="0" width="1200" height="400" rx="20" fill="#0F1A14"/>

  <!-- 章节标题 -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">
    <text x="48" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2.2" fill="#4A9B6E" font-weight="600">DOMAIN CARD WALL</text>
    <text x="48" y="84" font-size="30" fill="#E8E4D9" font-weight="700">业务域卡片墙</text>
    <text x="48" y="108" font-size="14" fill="#6B7E72">C2C 全链路,7 域协作</text>
  </g>

  <!-- 卡片网格:上排 4 张,下排 3 张 -->
  <g font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif' text-rendering="geometricPrecision">

    <!-- 上排 y=130 -->
    <!-- 用户 -->
    <g>
      <rect x="48" y="130" width="270" height="110" rx="10" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <rect x="48" y="130" width="270" height="4" rx="2" fill="#4A9B6E"/>
      <text x="68" y="162" font-size="16" fill="#E8E4D9" font-weight="700">用户</text>
      <text x="68" y="184" font-size="13" fill="#6B7E72">注册 · 登录 · JWT 鉴权</text>
      <text x="68" y="202" font-size="13" fill="#6B7E72">信用分初始与历史</text>
      <text x="68" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9B6E">小程序 · 管理后台</text>
    </g>
    <!-- 商品 -->
    <g>
      <rect x="326" y="130" width="270" height="110" rx="10" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <rect x="326" y="130" width="270" height="4" rx="2" fill="#4A9B6E"/>
      <text x="346" y="162" font-size="16" fill="#E8E4D9" font-weight="700">商品</text>
      <text x="346" y="184" font-size="13" fill="#6B7E72">发布 · 分类 · 上下架</text>
      <text x="346" y="202" font-size="13" fill="#6B7E72">关键词搜索 · 图片上传</text>
      <text x="346" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9B6E">卖家工作台 · 小程序</text>
    </g>
    <!-- 订单 -->
    <g>
      <rect x="604" y="130" width="270" height="110" rx="10" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <rect x="604" y="130" width="270" height="4" rx="2" fill="#4A9B6E"/>
      <text x="624" y="162" font-size="16" fill="#E8E4D9" font-weight="700">订单</text>
      <text x="624" y="184" font-size="13" fill="#6B7E72">下单 · 状态流转</text>
      <text x="624" y="202" font-size="13" fill="#6B7E72">待支付 / 待发货 / 已完成</text>
      <text x="624" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9B6E">小程序 · 卖家工作台</text>
    </g>
    <!-- 私聊 -->
    <g>
      <rect x="882" y="130" width="270" height="110" rx="10" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <rect x="882" y="130" width="270" height="4" rx="2" fill="#4A9B6E"/>
      <text x="902" y="162" font-size="16" fill="#E8E4D9" font-weight="700">私聊</text>
      <text x="902" y="184" font-size="13" fill="#6B7E72">买卖双方交易前沟通</text>
      <text x="902" y="202" font-size="13" fill="#6B7E72">文本 · 图片消息</text>
      <text x="902" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9B6E">小程序</text>
    </g>

    <!-- 下排 y=260(3 张,居中) -->
    <!-- 评价 -->
    <g>
      <rect x="187" y="260" width="270" height="110" rx="10" fill="#0F1A14" stroke="#4A9B6E" stroke-width="1"/>
      <rect x="187" y="260" width="270" height="4" rx="2" fill="#4A9B6E"/>
      <text x="207" y="292" font-size="16" fill="#E8E4D9" font-weight="700">评价</text>
      <text x="207" y="314" font-size="13" fill="#6B7E72">交易后双向评价</text>
      <text x="207" y="332" font-size="13" fill="#6B7E72">影响信用分</text>
      <text x="207" y="354" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#4A9B6E">小程序</text>
    </g>
    <!-- 信用分(琥珀描边,特色) -->
    <g>
      <rect x="465" y="260" width="270" height="110" rx="10" fill="none" stroke="#E8B547" stroke-width="1"/>
      <rect x="465" y="260" width="270" height="4" rx="2" fill="#E8B547"/>
      <text x="485" y="292" font-size="16" fill="#E8B547" font-weight="700">信用分</text>
      <text x="485" y="314" font-size="13" fill="#6B7E72">信任度量</text>
      <text x="485" y="332" font-size="13" fill="#6B7E72">平台风控信号</text>
      <text x="485" y="354" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#E8B547">管理后台</text>
    </g>
    <!-- AI(琥珀描边,特色) -->
    <g>
      <rect x="743" y="260" width="270" height="110" rx="10" fill="none" stroke="#E8B547" stroke-width="1"/>
      <rect x="743" y="260" width="270" height="4" rx="2" fill="#E8B547"/>
      <text x="763" y="292" font-size="16" fill="#E8B547" font-weight="700">AI 智能辅助</text>
      <text x="763" y="314" font-size="13" fill="#6B7E72">LLM 商品描述生成 · 客服问答</text>
      <text x="763" y="332" font-size="13" fill="#6B7E72">ASR 语音输入适配</text>
      <text x="763" y="354" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#E8B547">小程序 · 卖家工作台</text>
    </g>

  </g>

</svg>
